<div class="d-flex align-items-center mb-3">
  <a class="btn btn-sm btn-outline-secondary me-3" routerLink="/admissions"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">Admit patient</h4>
</div>

@if (error()) { <div class="alert alert-danger">{{ error() }}</div> }

<div class="card border-0 shadow-sm" style="max-width: 640px;">
  <div class="card-body p-4">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Patient <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="patientId">
          <option [value]="0" disabled>Select patient…</option>
          @for (p of patients(); track p.id) {
            <option [value]="p.id">{{ p.fullName }} ({{ p.phone }})</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Bed <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="bedId">
          <option [value]="0" disabled>Select an available bed…</option>
          @for (b of availableBeds(); track b.id) {
            <option [value]="b.id">{{ b.label }}</option>
          }
        </select>
        @if (availableBeds().length === 0) {
          <div class="form-text text-danger">No beds are currently available.</div>
        }
      </div>

      <div class="mb-3">
        <label class="form-label">Reason / diagnosis</label>
        <textarea class="form-control" rows="2" formControlName="reason" placeholder="e.g. Observation after surgery"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="saving()">
          {{ saving() ? 'Admitting…' : 'Admit patient' }}
        </button>
        <a class="btn btn-outline-secondary" routerLink="/admissions">Cancel</a>
      </div>
    </form>
  </div>
</div>
